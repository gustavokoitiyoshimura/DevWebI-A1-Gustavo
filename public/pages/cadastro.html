<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSM | Cadastro</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <main class="card">
      <div class="logos">
        <img
          class="logo-dsm"
          src="/assets/img/logo_dsm_transparente.png"
          alt="Logo DSM"
        />
        <img
          class="logo-fatec"
          src="/assets/img/logo_fatec_transparente.png"
          alt="Logo Fatec"
        />
        <img
          class="logo-cps"
          src="/assets/img/logo_cps_transparente.png"
          alt="Logo CPS"
        />
      </div>
      <h1 class="title">Cadastro</h1>
      <form class="auth-form" action="#" method="post">
        <label for="email">E-mail</label>
        <input type="email" required id="email"/>
        <label for="password">Senha</label>
        <input type="password" required id="password"/>
        <label for="confirmacao">Confirmação de senha</label>
        <input type="password" required id="confirmacao"/>
      </form>
      <div class="actions">
        <button class="btn-link">Cadastrar</button>
        <a class="btn-link" href="/login">Ir para login</a>
        <a class="btn-link btn-secondary" href="/">Voltar</a>
      </div>
    </main>
  </body>
</html>
